name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Install dependencies for minification and image conversion
        run: |
          sudo apt-get update
          sudo apt-get install -y webp
          npm install -g uglify-js csso-cli

      - name: Build and minify project
        run: |
          sh ./build.sh
          if [ ! -d "dist" ] || [ -z "$(ls -A dist 2>/dev/null)" ]; then
            echo "ERROR: dist/ directory is empty after build!"
            exit 1
          fi

      - name: Generate asset links
        run: |
          python scripts/generate_url.py

      - name: Build site manifest
        run: |
          python scripts/generate_manifest.py

      - name: Verify build output
        run: |
          if [ ! -f dist/index.html ] || [ ! -f dist/assets.json ]; then
            echo "ERROR: dist/index.html or dist/assets.json missing!"
            exit 1
          fi
          echo "Asset browser files present"

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
